<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chart</title>
<style>body{margin:0;background:#0e0e10;overflow:hidden}.tradingview-widget-container{width:100%;height:100vh}</style>
</head>
<body>
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget" style="width:100%;height:100%"></div>
</div>
<script>
var p = new URLSearchParams(window.location.search);
var config = {
  autosize: true,
  symbol: p.get('symbol') || 'AAPL',
  interval: p.get('interval') || 'D',
  timezone: 'Etc/UTC',
  theme: 'dark',
  style: '1',
  locale: 'en',
  hide_side_toolbar: true,
  allow_symbol_change: false,
  save_image: false,
  calendar: false,
  studies: [
    {id:'MAExp@tv-basicstudies', inputs:{length:10}, styles:{Plot:{color:'#f23645'}}},
    {id:'MAExp@tv-basicstudies', inputs:{length:20}, styles:{Plot:{color:'#ffffff'}}},
    {id:'MASimple@tv-basicstudies', inputs:{length:50}, styles:{Plot:{color:'#26a69a'}}}
  ],
  support_host: 'https://www.tradingview.com'
};
var container = document.querySelector('.tradingview-widget-container');
var script = document.createElement('script');
script.type = 'text/javascript';
script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
script.async = true;
script.textContent = JSON.stringify(config);
container.appendChild(script);
</script>
</body>
</html>
