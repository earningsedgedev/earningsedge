<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chart</title>
<style>html,body{margin:0;padding:0;width:100%;height:100%;background:#0e0e10;overflow:hidden}.tradingview-widget-container{width:100%;height:100%}</style>
</head>
<body>
<script>
var p = new URLSearchParams(window.location.search);
var sym = p.get('symbol') || 'AAPL';
var intv = p.get('interval') || 'D';
var cfg = JSON.stringify({
  autosize: true,
  symbol: sym,
  interval: intv,
  timezone: 'Etc/UTC',
  theme: 'dark',
  style: '1',
  locale: 'en',
  hide_side_toolbar: true,
  allow_symbol_change: false,
  save_image: false,
  calendar: false,
  studies: [
    {id:'MAExp@tv-basicstudies', inputs:{length:10}, styles:{Plot:{color:'#f23645'}}},
    {id:'MAExp@tv-basicstudies', inputs:{length:20}, styles:{Plot:{color:'#ffffff'}}},
    {id:'MASimple@tv-basicstudies', inputs:{length:50}, styles:{Plot:{color:'#26a69a'}}}
  ],
  support_host: 'https://www.tradingview.com'
});
document.write(
  '<div class="tradingview-widget-container" style="width:100%;height:100%">' +
  '<div class="tradingview-widget-container__widget" style="width:100%;height:100%"></div>' +
  '<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>' +
  cfg +
  '<\/script>' +
  '</div>'
);
</script>
</body>
</html>
