<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chart</title>
<style>body{margin:0;background:#0e0e10;overflow:hidden}#tv_chart{width:100%;height:100vh}</style>
</head>
<body>
<div id="tv_chart"></div>
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
var p = new URLSearchParams(window.location.search);
var symbol = p.get('symbol') || 'AAPL';
var interval = p.get('interval') || 'D';
new TradingView.widget({
  container_id: 'tv_chart',
  autosize: true,
  symbol: symbol,
  interval: interval,
  timezone: 'Etc/UTC',
  theme: 'dark',
  style: '1',
  locale: 'en',
  hide_side_toolbar: true,
  allow_symbol_change: false,
  save_image: false,
  studies: [
    {id:'MAExp@tv-basicstudies', inputs:{length:10}, styles:{plot:{color:{type:'rgb',value:'#f23645'}}}},
    {id:'MAExp@tv-basicstudies', inputs:{length:20}, styles:{plot:{color:{type:'rgb',value:'#ffffff'}}}},
    {id:'MASimple@tv-basicstudies', inputs:{length:50}, styles:{plot:{color:{type:'rgb',value:'#26a69a'}}}}
  ]
});
</script>
</body>
</html>
